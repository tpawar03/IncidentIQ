[project]
name = "incidentiq"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Tanmay Pawar", email = "pawartanmay012@gmail.com" }
]
requires-python = ">=3.13"
dependencies = [
    "httpx>=0.28.1",
    "pydantic>=2.13.4",
]

[project.scripts]
incidentiq = "incidentiq:main"

[build-system]
requires = ["uv_build>=0.11.19,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.4.0",
]
