[project]
name = "incidentiq"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Tanmay Pawar", email = "pawartanmay012@gmail.com" }
]
requires-python = ">=3.13"
dependencies = [
    "httpx>=0.28.1",
    "pydantic>=2.13.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["incidentiq"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.4.0",
]
